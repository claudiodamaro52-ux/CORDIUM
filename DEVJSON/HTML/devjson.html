<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEVJSON - Cordium</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#1a0a02;display:flex;flex-direction:column;height:100vh;overflow:hidden}
header{background:#1a0a02;color:white;padding:8px 16px;display:flex;align-items:center;gap:10px;border-bottom:2px solid #c9820a;flex-shrink:0}
header img{height:40px;border-radius:5px}
header h1{font-size:20px}
header nav{margin-left:auto}
header nav a{color:#ccc;margin-left:14px;text-decoration:none;font-size:13px}
header nav a:hover{color:#c9820a}
.alert{background:#fff3cd;padding:4px 14px;font-size:12px;color:#856404;border-bottom:1px solid #ffc107;flex-shrink:0}
.ops{background:#3d1f00;padding:7px 12px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;flex-shrink:0}
.ops-label{color:#c9820a;font-weight:bold;font-size:12px}
.btn-op{background:#c9820a;color:white;border:none;border-radius:4px;padding:5px 11px;cursor:pointer;font-size:12px;font-weight:bold}
.btn-op:hover{background:#a06808}
.main{flex:1;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:5px;padding:5px;overflow:hidden}
.panel{display:flex;flex-direction:column;background:white;border-radius:6px;border:2px solid #c9820a;overflow:hidden}
.ph{background:#3d1f00;color:white;padding:4px 8px;display:flex;gap:4px;align-items:center;flex-shrink:0}
.pt{flex:1;font-weight:bold;font-size:12px;color:#f0c060}
.ph button{background:#c9820a;color:white;border:none;border-radius:3px;padding:2px 7px;cursor:pointer;font-size:11px}
.ph button:hover{background:#a06808}
textarea{flex:1;width:100%;border:none;padding:7px 9px;font-family:Consolas,monospace;font-size:12px;resize:none;outline:none;background:#fffdf8;color:#222}
#p3{background:#f0f8e8}
.msgs{flex:1;overflow-y:auto;padding:6px 10px;font-family:Consolas,monospace;font-size:11px;background:#1e1e1e;color:#ccc}
.m{padding:2px 0;border-bottom:1px solid #2a2a2a}
.ok{color:#4ec94e}.warn{color:#e0a020;font-weight:bold}.err{color:#f44336;font-weight:bold}
</style>
</head>
<body>
<header>
  <img src="/img/Logo_Cordium.png" alt="Cordium">
  <h1>DEVJSON</h1>
  <nav><a href="/">Inicio</a></nav>
</header>
<div class="alert">[!] <b>Normalizacao</b> converte chaves e valores para texto simples (string). Execute antes das demais operacoes e ajuste tipos manualmente se necessario.</div>
<div class="ops">
  <span class="ops-label">Operacoes (usa Painel 1):</span>
  <button class="btn-op" data-op="normalize">Normalizar</button>
  <button class="btn-op" data-op="format">Indentar</button>
  <button class="btn-op" data-op="template">Template</button>
  <button class="btn-op" data-op="types">Tipos</button>
  <button class="btn-op" data-op="json2csv">JSON para CSV</button>
  <button class="btn-op" data-op="csv2json">CSV para JSON</button>
</div>
<div class="main">
  <div class="panel"><div class="ph"><span class="pt">1 - Entrada A</span><button class="btn-ph" data-action="clear" data-target="p1">Limpar</button></div><textarea id="p1" placeholder="Cole ou digite o JSON aqui..."></textarea></div>
  <div class="panel"><div class="ph"><span class="pt">2 - Entrada B (comparacao e mesclagem)</span><button class="btn-ph" data-action="clear" data-target="p2">Limpar</button></div><textarea id="p2" placeholder="Segundo texto para comparacao ou mesclagem..."></textarea></div>
  <div class="panel"><div class="ph"><span class="pt">3 - Resultado</span><button class="btn-ph" data-action="copy">Copiar</button><button class="btn-ph" data-action="top1">Para Painel 1</button><button class="btn-ph" data-action="clear" data-target="p3">Limpar</button></div><textarea id="p3" readonly placeholder="Resultado aparecera aqui..."></textarea></div>
  <div class="panel"><div class="ph"><span class="pt">4 - Mensagens / Andamento</span><button class="btn-ph" data-action="clrlog">Limpar</button></div><div id="p4" class="msgs"></div></div>
</div>
<script>
function g(id){return document.getElementById(id);}
function log(msg,type){var d=document.createElement("div");d.className="m "+(type||"ok");d.textContent=new Date().toLocaleTimeString("pt-BR")+"  "+msg;g("p4").appendChild(d);g("p4").scrollTop=g("p4").scrollHeight;}
function sanitize(s){s=String(s==null?"":s);s=s.replace(/\r\n|\r|\n/g," ");s=s.replace(/"/g,"\x27");s=s.normalize("NFD").replace(/\p{Mn}/gu,"");s=s.replace(/ {2,}/g," ");return s.trim();}
function normalizeNode(v){if(v===null||v===undefined)return"";if(Array.isArray(v))return v.map(normalizeNode);if(typeof v==="object"){var r={};for(var k in v)r[sanitize(k)]=normalizeNode(v[k]);return r;}return sanitize(v);}
function makeTemplate(v){if(Array.isArray(v))return v.length?[makeTemplate(v[0])]:[];if(v!==null&&typeof v==="object"){var r={};for(var k in v)r[k]=makeTemplate(v[k]);return r;}return"";}
function makeTypes(v){if(Array.isArray(v))return v.length?[makeTypes(v[0])]:[];if(v!==null&&typeof v==="object"){var r={};for(var k in v)r[k]=makeTypes(v[k]);return r;}if(typeof v==="boolean")return"<boolean>";if(typeof v==="number")return"<number>";if(v==="true"||v==="false")return"<boolean>";var n=Number(v);if(!isNaN(n)&&String(v).trim()!=="")return"<number>";return"<string>";}
function json2csv(text){var data=JSON.parse(text);if(!Array.isArray(data))data=[data];if(!data.length)return"(array vazio)";var keys=Object.keys(data[0]);var esc=function(v){if(v==null)v="";v=typeof v==="object"?JSON.stringify(v):String(v);if(v.indexOf(",")>=0||v.indexOf("\"")>=0||v.indexOf("\n")>=0)v="\""+v.replace(/"/g,"\"\"")+"\"";return v;};var rows=[keys.map(esc).join(",")];data.forEach(function(row){rows.push(keys.map(function(k){return esc(row[k]);}).join(","));});return rows.join("\n");}
function csv2json(text){var lines=text.trim().split("\n");if(lines.length<2)throw new Error("CSV: cabecalho + ao menos 1 linha de dados.");var parseRow=function(line){var cols=[],cur="",inQ=false;for(var i=0;i<line.length;i++){var c=line[i];if(c==="\""){if(inQ&&line[i+1]==="\""){cur+="\"";i++;}else inQ=!inQ;}else if(c===","&&!inQ){cols.push(cur);cur="";}else cur+=c;}cols.push(cur);return cols.map(function(s){return s.trim();});};var keys=parseRow(lines[0]);var result=lines.slice(1).filter(function(l){return l.trim();}).map(function(line){var vals=parseRow(line),obj={};keys.forEach(function(k,i){obj[k]=vals[i]!==undefined?vals[i]:"";});return obj;});return JSON.stringify(result,null,2);}
function runOp(op){g("p4").innerHTML="";var t1=g("p1").value.trim();var result="";try{if(op==="normalize"){log("Normalizando...","warn");log("[!] Valores serao convertidos para texto.","warn");result=JSON.stringify(normalizeNode(JSON.parse(t1)),null,2);log("Concluido.");log("[!] Ajuste os tipos se necessario.","warn");}else if(op==="format"){result=JSON.stringify(JSON.parse(t1),null,2);log("JSON indentado.");}else if(op==="template"){result=JSON.stringify(makeTemplate(JSON.parse(t1)),null,2);log("Template gerado.");}else if(op==="types"){result=JSON.stringify(makeTypes(JSON.parse(t1)),null,2);log("Tipos gerados.");}else if(op==="json2csv"){result=json2csv(t1);log("JSON convertido para CSV.");}else if(op==="csv2json"){result=csv2json(t1);log("CSV convertido para JSON.");}}catch(e){log("Erro: "+e.message,"err");result="";}g("p3").value=result;}
document.querySelectorAll(".btn-op").forEach(function(btn){btn.addEventListener("click",function(){runOp(this.dataset.op);});});
document.querySelectorAll(".btn-ph").forEach(function(btn){btn.addEventListener("click",function(){var a=this.dataset.action,t=this.dataset.target;if(a==="clear"){g(t).value="";}else if(a==="clrlog"){g("p4").innerHTML="";}else if(a==="copy"){var v=g("p3").value;if(!v){log("Painel 3 vazio.","warn");return;}navigator.clipboard.writeText(v).then(function(){log("Copiado.");}).catch(function(e){log("Erro: "+e,"err");});}else if(a==="top1"){var v=g("p3").value;if(!v){log("Painel 3 vazio.","warn");return;}g("p1").value=v;log("Transferido para Painel 1.");}});});
</script>
</body>
</html>
